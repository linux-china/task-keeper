    repositories {
        gradlePluginPortal()
    }
    dependencies {
        classpath 'org.cyclonedx.bom:org.cyclonedx.bom.gradle.plugin:3.2.0'
    }
}

allprojects {
    // output dir: build/reports/cyclonedx-direct/bom.json
